<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#e6eefc" />
      <stop offset="100%" stop-color="#f6f7fb" />
    </linearGradient>
    <linearGradient id="grad" x1="0" x2="1">
      <stop offset="0%" stop-color="#6f5cff" />
      <stop offset="50%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#ff8fb3" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b" />
      <feComposite in="SourceGraphic" in2="b" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- soft aurora blob -->
  <g filter="url(#soft)" opacity="0.65">
    <ellipse cx="520" cy="200" rx="260" ry="120" fill="url(#grad)" />
    <ellipse cx="220" cy="820" rx="200" ry="90" fill="#7c3aed" opacity="0.18" />
  </g>

  <!-- simulated portrait frame -->
  <g transform="translate(120,160)">
    <rect x="0" y="0" width="560" height="680" rx="28" fill="#f3f6f9" />
    <rect x="14" y="14" width="532" height="652" rx="20" fill="#dfeaf6" />

    <!-- placeholder blurred face block -->
    <rect x="126" y="80" width="300" height="360" rx="20" fill="#bfcde0" />
    <rect x="136" y="110" width="280" height="320" rx="18" fill="#cfdbea" opacity="0.9" />

    <!-- shirt -->
    <rect x="90" y="440" width="380" height="180" rx="28" fill="#9fbbe0" />

    <!-- subtle gradient overlay -->
    <rect x="0" y="0" width="560" height="680" rx="28" fill="url(#grad)" opacity="0.02" />
  </g>

  <!-- frame ring -->
  <rect x="110" y="150" width="580" height="720" rx="32" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3" />
</svg>
